[loggers]
keys=root

[handlers]
keys=consoleHandler

[formatters]
keys=detailedFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=detailedFormatter
args=("ext://sys.stdout",)

[formatter_detailedFormatter]
format=%(levelname)-8s [%(asctime)s.%(msecs)03d] %(name)s:%(lineno)d %(funcName)s() - %(message)s
datefmt=%Y-%m-%d %H:%M:%S